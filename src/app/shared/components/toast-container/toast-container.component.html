<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80">
    <div *ngFor="let toast of notificationService.notifications(); trackBy: trackById"
        class="flex items-start gap-3 rounded-xl border px-4 py-3 shadow-lg transition-all duration-300 bg-white"
        [ngClass]="toastClasses(toast)">
        <div class="mt-0.5 shrink-0" [innerHTML]="icon(toast.type)"></div>
        <p class="text-sm font-medium flex-1">{{ toast.message }}</p>
        <button (click)="notificationService.dismiss(toast.id)"
            class="text-slate-400 hover:text-slate-600 transition-colors shrink-0">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</div>
