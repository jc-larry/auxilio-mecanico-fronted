<div class="flex min-h-screen bg-background font-body">

    <!-- ── Sidebar ── -->
    <aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 flex flex-col py-6 px-4 z-50">

        <!-- Brand -->
        <div class="mb-10 px-2 flex items-center gap-3">
            <div class="w-10 h-10 machined-gradient rounded-lg flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-on-primary"
                    style="font-variation-settings:'FILL' 1; font-size:22px;">precision_manufacturing</span>
            </div>
            <div>
                <h1 class="font-headline font-bold text-on-surface text-lg leading-tight">Auxilio Mecánico</h1>
                <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-label font-bold">Admin</p>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 space-y-1">
            <a *ngFor="let item of navItems" [routerLink]="item.route"
                routerLinkActive="bg-white text-on-surface shadow-sm scale-[0.98] font-semibold"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-headline font-semibold tracking-tight
                   text-on-surface-variant hover:text-on-surface hover:bg-slate-200/50 transition-all duration-150 active:scale-[0.98]">
                <span class="material-symbols-outlined" style="font-size:20px;">{{ item.icon }}</span>
                <span>{{ item.label }}</span>
            </a>
        </nav>

        <!-- Bottom actions -->
        <div class="flex items-center justify-center gap-3 mb-3">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-headline font-bold text-on-surface">{{ user()?.full_name }}</p>
                <p class="text-xs font-headline font-label text-on-surface-variant">{{ user()?.email }}</p>
            </div>
            <div class="w-9 h-9 rounded-full machined-gradient flex items-center justify-center
                          text-on-primary font-headline font-bold text-sm shrink-0">
                {{ initials() }}
            </div>
        </div>
        <button (click)="logout()" class="flex items-center text-sm text-on-surface-variant hover:text-on-surface transition-colors px-3 py-1.5
                     rounded-lg hover:bg-surface-container border border-transparent hover:border-outline-variant/10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Cerrar sesión
        </button>
