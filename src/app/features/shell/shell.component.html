<div class="flex min-h-screen bg-background font-body">

    <!-- ── Sidebar ── -->
    <aside class="h-screen w-64 fixed left-0 top-0 bg-slate-100 flex flex-col py-6 px-4 z-50 border-r border-outline-variant/30">

        <!-- Brand -->
        <div class="mb-10 px-2 flex items-center gap-3">
            <div class="w-10 h-10 machined-gradient rounded-lg flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-on-primary"
                    style="font-variation-settings:'FILL' 1; font-size:22px;">handyman</span>
            </div>
            <div>
                <h1 class="font-headline font-bold text-on-surface text-lg leading-tight">Auxilio Mecánico</h1>
                <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-label font-bold">{{ user()?.roles?.[0] || 'Usuario' }}</p>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 space-y-1 overflow-y-auto">
            <div *ngFor="let item of navItems()">
                <!-- Menu Parent with Children -->
                <div *ngIf="item.children; else singleItem">
                    <button (click)="toggleMenu(item.label)"
                        class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg font-headline font-semibold tracking-tight
                               text-on-surface-variant hover:text-on-surface hover:bg-slate-200/50 transition-all duration-150 active:scale-[0.98]">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined" style="font-size:20px;">{{ item.icon }}</span>
                            <span>{{ item.label }}</span>
                        </div>
                        <span class="material-symbols-outlined transition-transform duration-200"
                            [class.rotate-180]="isExpanded(item.label)" style="font-size:18px;">
                            expand_more
                        </span>
                    </button>
                    
                    <!-- Children items -->
                    <div *ngIf="isExpanded(item.label)" class="mt-1 ml-4 pl-4 border-l border-slate-300/50 space-y-1">
                        <a *ngFor="let child of item.children" [routerLink]="child.route"
                            routerLinkActive="text-on-surface font-bold bg-slate-200/30"
                            [routerLinkActiveOptions]="{ exact: true }"
                            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-headline font-medium
                                   text-on-surface-variant hover:text-on-surface hover:bg-slate-200/40 transition-all duration-150">
                            <span class="material-symbols-outlined" style="font-size:18px;">{{ child.icon }}</span>
                            <span>{{ child.label }}</span>
                        </a>
                    </div>
                </div>

                <!-- Single Menu Item -->
                <ng-template #singleItem>
                    <a [routerLink]="item.route"
                        routerLinkActive="bg-white text-on-surface shadow-sm scale-[0.98] font-semibold"
                        [routerLinkActiveOptions]="{ exact: true }"
                        class="flex items-center gap-3 px-3 py-2.5 border border-outline-variant/40 rounded-lg font-headline font-semibold tracking-tight
                               text-on-surface-variant hover:text-on-surface hover:bg-slate-200/50 transition-all duration-150 active:scale-[0.98]">
                        <span class="material-symbols-outlined" style="font-size:20px;">{{ item.icon }}</span>
                        <span>{{ item.label }}</span>
                    </a>
                </ng-template>
            </div>
        </nav>

        <!-- Bottom actions -->
        <div class="flex items-center justify-center gap-3 mb-4 mt-4">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-headline font-bold text-on-surface">{{ user()?.full_name }}</p>
                <p class="text-xs font-headline font-label text-on-surface-variant">{{ user()?.email }}</p>
            </div>
            <div class="w-9 h-9 rounded-full machined-gradient flex items-center justify-center
                          text-on-primary font-headline font-bold text-sm shrink-0">
                {{ initials() }}
            </div>
        </div>
        <button (click)="logout()" class="flex items-center gap-2 text-sm text-error font-bold hover:text-white transition-all px-3 py-2
                     rounded-lg hover:bg-error border border-error/40 hover:border-error active:scale-[0.98]">
            <span class="material-symbols-outlined" style="font-size:18px;">logout</span>
            Cerrar sesión
        </button>
    </aside>
    
    <div class="ml-64 flex flex-col flex-1 min-h-screen">
        <main class="flex-1">
            <router-outlet />
        </main>
    </div>
</div>
