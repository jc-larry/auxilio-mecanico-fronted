<div class="min-h-screen flex bg-surface">

    <!-- ── Main panel: form ── -->
    <div class="flex-1 flex flex-col justify-center items-center px-6 py-12 sm:px-12 overflow-y-auto">
        <div class="w-full max-w-md">

            <!-- Heading -->
            <p class="text-[11px] uppercase tracking-widest text-on-surface-variant font-label font-bold mb-2">Nueva
                cuenta</p>
            <h2 class="font-headline font-extrabold text-primary text-3xl mb-8 leading-tight">Crea tu perfil</h2>

            <!-- Success -->
            <div *ngIf="successMessage()"
                class="mb-6 flex items-start gap-3 rounded-lg bg-surface-container-low px-4 py-3 ghost-shadow">
                <span class="material-symbols-outlined shrink-0 mt-0.5"
                    style="font-size:16px; color:#059669; font-variation-settings:'FILL' 1;">check_circle</span>
                <p class="text-sm font-label font-medium" style="color:#059669">{{ successMessage() }}</p>
            </div>

            <!-- Error -->
            <div *ngIf="serverError()"
                class="mb-6 flex items-start gap-3 rounded-lg bg-tertiary-container/10 px-4 py-3">
                <span class="material-symbols-outlined text-error shrink-0 mt-0.5"
                    style="font-size:16px; font-variation-settings:'FILL' 1;">error</span>
                <p class="text-sm text-error font-label font-medium">{{ serverError() }}</p>
            </div>

            <!-- Form -->
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" novalidate>

                <!-- Row: full name + username -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <app-input-field id="full_name" label="Nombre completo" type="text" placeholder="John Doe"
                        [required]="true" icon="person" [control]="form['full_name']" formControlName="full_name" />
                    <app-input-field id="username" label="Nombre de usuario" type="text" placeholder="johndoe"
                        [required]="true" icon="alternate_email" [control]="form['username']"
                        formControlName="username" />
                </div>

                <app-input-field id="email" label="Correo electrónico" type="email" placeholder="you@example.com"
                    [required]="true" icon="mail" [control]="form['email']" formControlName="email" />

                <!-- Row: password + confirm -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <app-input-field id="password" label="Contraseña" type="password" placeholder="Min. 8 chars"
                        [required]="true" icon="lock" [control]="form['password']" formControlName="password" />
                    <app-input-field id="confirm_password" label="Confirmar contraseña" type="password"
                        placeholder="Repetir contraseña" [required]="true" icon="lock_reset"
                        [control]="confirmPasswordControl" formControlName="confirm_password" />
                </div>

                <!-- Password rules hint -->
                <div class="flex items-start gap-2 bg-surface-container-low rounded-lg px-4 py-3">
                    <span class="material-symbols-outlined text-on-surface-variant shrink-0 mt-0.5"
                        style="font-size:15px;">info</span>
                    <p class="text-[11px] text-on-surface-variant font-label leading-relaxed">
                        La contraseña debe tener <span class="font-bold text-on-surface">8+ caracteres</span> con al
                        menos
                        una <span class="font-bold text-on-surface">letra mayúscula</span> y un
                        <span class="font-bold text-on-surface">número</span>.
                    </p>
                </div>

                <!-- Submit -->
                <button type="submit" [disabled]="isLoading()" class="mt-1 w-full machined-gradient text-on-primary font-headline font-bold text-sm
                     py-3.5 rounded-lg flex items-center justify-center gap-2
                     transition-all duration-150 active:scale-[0.98]
                     focus:outline-none focus:ring-2 focus:ring-primary/40 focus:ring-offset-2
                     disabled:opacity-50 disabled:cursor-not-allowed ghost-shadow-md">
                    <svg *ngIf="isLoading()" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                    </svg>
                    <span class="material-symbols-outlined" *ngIf="!isLoading()"
                        style="font-size:18px;">person_add</span>
                    {{ isLoading() ? 'Creando cuenta...' : 'Crear cuenta' }}
                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-7">
                <div class="flex-1 h-px bg-outline-variant/40"></div>
                <span
                    class="text-[11px] uppercase tracking-widest text-on-surface-variant font-label font-bold">o</span>
                <div class="flex-1 h-px bg-outline-variant/40"></div>
            </div>

            <p class="text-center text-sm text-on-surface-variant font-body">
                ¿Ya tienes una cuenta?
                <a routerLink="/auth/login"
                    class="text-primary font-label font-bold hover:text-primary-container transition-colors ml-1">
                    Inica sesión &rarr;
                </a>
            </p>
        </div>
    </div>
</div>
