<div class="min-h-screen flex bg-surface">

    <!-- ── Left panel: brand / illustration ── -->
    <div
        class="hidden lg:flex w-[46%] xl:w-[42%] machined-gradient flex-col justify-between p-10 xl:p-14 relative overflow-hidden shrink-0">

        <!-- Decorative rings -->
        <div class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full border border-white/5"></div>
        <div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full border border-white/5"></div>
        <div class="absolute top-1/3 right-0 w-48 h-48 rounded-full border border-white/5"></div>

        <!-- Logo -->
        <div class="flex items-center gap-3 relative z-10">
            <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-on-primary"
                    style="font-variation-settings:'FILL' 1; font-size:22px;">precision_manufacturing</span>
            </div>
            <div>
                <p class="font-headline font-bold text-on-primary text-lg leading-tight">Precision Flow</p>
                <p class="text-[10px] uppercase tracking-widest text-on-primary/40 font-label font-bold">Auth System</p>
            </div>
        </div>

        <!-- Center copy -->
        <div class="relative z-10">
            <p class="text-[11px] uppercase tracking-widest text-secondary font-label font-bold mb-4">Bienvenido</p>
            <!-- <h1 class="font-headline font-extrabold text-on-primary text-4xl xl:text-5xl leading-[1.1] mb-6">
                The mechanic's<br />digital cockpit.
            </h1> -->
            <p class="text-on-primary/50 text-sm leading-relaxed max-w-xs font-body">
                Sistema de gestión para talleres mecánicos.
            </p>
        </div>

        <!-- Footer label
        <p class="text-[10px] text-on-primary/25 font-label uppercase tracking-widest relative z-10">
            Powered by Precision Flow v1.0
        </p> -->
    </div>

    <!-- ── Right panel: form ── -->
    <div class="flex-1 flex flex-col justify-center items-center px-6 py-12 sm:px-12">
        <div class="w-full max-w-md">

            <!-- Mobile logo -->
            <div class="flex items-center gap-3 mb-10 lg:hidden">
                <div class="w-9 h-9 machined-gradient rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-on-primary"
                        style="font-variation-settings:'FILL' 1; font-size:20px;">precision_manufacturing</span>
                </div>
                <p class="font-headline font-bold text-primary text-base">Auxilio Mecánico</p>
            </div>

            <!-- Heading -->
            <p class="text-[11px] uppercase tracking-widest text-on-surface-variant font-label font-bold mb-2">Accede a
                tu cuenta</p>
            <h2 class="font-headline font-extrabold text-primary text-3xl mb-8 leading-tight">Iniciar sesión</h2>

            <!-- Error alert -->
            <div *ngIf="serverError()"
                class="mb-6 flex items-start gap-3 rounded-lg bg-tertiary-container/10 px-4 py-3">
                <span class="material-symbols-outlined text-error shrink-0 mt-0.5"
                    style="font-size:16px; font-variation-settings:'FILL' 1;">error</span>
                <p class="text-sm text-error font-label font-medium">{{ serverError() }}</p>
            </div>

            <!-- Form -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" novalidate>

                <app-input-field id="email" label="Correo electrónico" type="email" placeholder="you@example.com"
                    [required]="true" icon="alternate_email" [control]="form['email']" formControlName="email" />

                <app-input-field id="password" label="Contraseña" type="password" placeholder="Enter your password"
                    [required]="true" icon="lock" [control]="form['password']" formControlName="password" />

                <!-- Submit -->
                <button type="submit" [disabled]="isLoading()" class="mt-2 w-full machined-gradient text-on-primary font-headline font-bold text-sm
                     py-3.5 rounded-lg flex items-center justify-center gap-2
                     transition-all duration-150 active:scale-[0.98]
                     focus:outline-none focus:ring-2 focus:ring-primary/40 focus:ring-offset-2
                     disabled:opacity-50 disabled:cursor-not-allowed ghost-shadow-md">
                    <svg *ngIf="isLoading()" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                    </svg>
                    <span class="material-symbols-outlined" *ngIf="!isLoading()" style="font-size:18px;">login</span>
                    {{ isLoading() ? 'Iniciando sesión...' : 'Iniciar sesión' }}
                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-7">
                <div class="flex-1 h-px bg-outline-variant/40"></div>
                <span
                    class="text-[11px] uppercase tracking-widest text-on-surface-variant font-label font-bold">or</span>
                <div class="flex-1 h-px bg-outline-variant/40"></div>
            </div>

            <p class="text-center text-sm text-on-surface-variant font-body">
                ¿No tienes cuenta?
                <a routerLink="/auth/register"
                    class="text-primary font-label font-bold hover:text-primary-container transition-colors ml-1">
                    Crear una &rarr;
                </a>
            </p>
        </div>
    </div>
</div>
